---
"$schema": https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
blocks:
  - alignment: left
    type: prompt
    segments:
      - background: "#a313a8"
        foreground: "#FFEB3B"
        style: plain
        template: "⚡ "
        type: root
      - background: transparent
        foreground: "#ffffff"
        style: plain
        template: "{{.Icon}} "
        type: os
      - background: "#01579B"
        foreground: "#ffffff"
        leading_diamond: "<transparent,#01579B></>"
        style: diamond
        template: " {{ .Name }} "
        trailing_diamond: ""
        type: shell
      - background: "#91ddff"
        foreground: "#100e23"
        leading_diamond: "<transparent,#91ddff></>"
        options:
          folder_icon: "\uf115"
          folder_separator_icon: "<transparent>  \ue0b1 </>"
          home_icon: "\uf7db"
          style: agnoster_short
        style: diamond
        template: " {{ .Path }} "
        trailing_diamond: ""
        type: path
      - background: "#00C853"
        background_templates:
          - "{{ if or (.Working.Changed) (.Staging.Changed) }}#FFEB3B{{ end }}"
          - "{{ if and (gt .Ahead 0) (gt .Behind 0) }}#FFCC80{{ end }}"
          - "{{ if gt .Ahead 0 }}#B388FF{{ end }}"
          - "{{ if gt .Behind 0 }}#B388FF{{ end }}"
        foreground: "#000000"
        powerline_symbol: ""
        options:
          fetch_status: true
        style: powerline
        template:
          " {{ abbrev 32 .HEAD }}{{ if .Staging.Changed }}<#FF6F00>  {{ .Staging.String
          }}</>{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{
          if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if gt .StashCount
          0 }}  {{ .StashCount }}{{ end }} "
        type: git
      - background: "#49404f"
        foreground: "#ffffff"
        leading_diamond: "<transparent,#49404f></>"
        options:
          style: dallas
          threshold: 0
        style: diamond
        template: " {{ .FormattedMs }}s "
        trailing_diamond: ""
        type: executiontime
      - background: "#910000"
        foreground: "#ffffff"
        powerline_symbol: ""
        style: powerline
        template: "<transparent> </> {{ .Code }} "
        type: status
  - alignment: right
    type: prompt
    segments:
      - background: "#29315A"
        foreground: "#43CCEA"
        leading_diamond: ""
        trailing_diamond: ""
        style: diamond
        template: " {{ .UserName }} "
        type: session
      - background: "#29315A"
        foreground: "#43CCEA"
        leading_diamond: ""
        trailing_diamond: ""
        style: diamond
        template: "{{ .HostName }} "
        type: session
      - background: "#29315A"
        foreground: "#3EC669"
        options:
          time_format: "Kitchen"
        leading_diamond: ""
        style: diamond
        template: " {{ .CurrentDate | date .Format }} "
        type: time
  - alignment: left
    type: prompt
    newline: true
    segments:
      - foreground: "#ffffff"
        foreground_templates:
          - "{{ if gt .Code 0 }}#ff0000{{ end }}"
        options:
          always_enabled: true
        style: plain
        template: "❯ "
        type: status
console_title_template:
  "{{if .Root}} ⚡ {{end}}{{.Folder | replace \"~\" \"\U0001F3DA\"
  }} @ {{.HostName}}"
version: 4